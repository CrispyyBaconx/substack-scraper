<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Substack Scraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="header">
    <h1 onclick="navigateTo('/')">Substack Scraper</h1>
    <div class="live-dot" id="liveDot" title="Live"></div>
    <span class="badge" id="articleCount">...</span>
    <div class="search-wrapper" id="searchWrapper">
      <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search articles or newsletters…" autocomplete="off" spellcheck="false">
    </div>
    <div class="spacer"></div>
    <a href="/docs" class="header-btn" title="API Documentation">📖 Docs</a>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
  </div>
  <div class="container" id="app">
    <div class="loading">Loading...</div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
